services:
  api:
    image: ${API_IMAGE:-costrui/api:dev}
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    container_name: local-api
    env_file:
      - ./backend/.env
    ports:
      - "127.0.0.1:3002:3001"
    extra_hosts:
      - "mongodb:host-gateway"
    expose:
      - "3001"
    networks:
      - local_stack_net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3001/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 3s
      retries: 12

  web:
    image: ${WEB_IMAGE:-costrui/web:dev}
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    container_name: local-web
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:8081:80"
    expose:
      - "80"
    networks:
      - local_stack_net
networks:
  local_stack_net:
    name: local-stack-net

